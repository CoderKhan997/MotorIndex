<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotorIndex — Vehicle Reference</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark"><span class="logo-m">M</span><span class="logo-i">I</span></span>
      </a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="theme-icon theme-icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="theme-icon theme-icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-inner">
        <h1 class="hero-title"><span class="hero-title-motor">MOTOR</span><span class="hero-title-index">INDEX</span></h1>
        <p class="hero-subtitle">Your complete vehicle reference database</p>
      </div>
    </section>

    <!-- Floating search bar -->
    <div class="float-search" id="floatSearch">

      <!-- Car / Bike mode toggle -->
      <div class="mode-toggle" id="modeToggle" role="tablist" aria-label="Vehicle type">
        <div class="mode-pill" id="modePill"></div>
        <button class="mode-btn active" id="modeCarBtn" data-mode="car" role="tab" aria-selected="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
            <path d="M3 12L5.5 6h13L21 12v4a1 1 0 0 1-1 1h-1"/><path d="M3 12v4a1 1 0 0 0 1 1h1"/>
            <circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/>
            <path d="M7.5 12h9"/>
          </svg>
          Cars
        </button>
        <button class="mode-btn" id="modeMotoBtn" data-mode="motorcycle" role="tab" aria-selected="false">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
            <circle cx="5.5" cy="17.5" r="3"/><circle cx="18.5" cy="17.5" r="3"/>
            <path d="M8.5 17.5h6"/><path d="M15 6l2 5h-5l-3-3"/>
            <path d="M10 8l-2.5 2.5"/>
          </svg>
          Bikes
        </button>
      </div>

      <div class="search-box" id="searchBox">
        <div class="search-input-row">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            type="text"
            class="search-input"
            id="searchInput"
            placeholder="Search by make or model..."
            autocomplete="off"
            spellcheck="false"
          >
          <button class="search-clear hidden" id="searchClear" aria-label="Clear">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="14" height="14">
              <path d="M18 6 6 18M6 6l12 12"/>
            </svg>
          </button>
        </div>
        <div class="search-dropdown" id="searchDropdown" role="listbox" aria-label="Search results"></div>
      </div>
      <div class="float-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
    </div>

    <!-- Vertical icon strip: slides in beside the tree when the search bar is minimized -->
    <div class="search-strip" id="searchStrip" role="navigation" aria-label="Quick navigation">
      <button class="strip-btn strip-active" id="stripCarBtn" title="Cars" aria-label="Cars">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true">
          <path d="M3 12L5.5 6h13L21 12v4a1 1 0 0 1-1 1h-1"/><path d="M3 12v4a1 1 0 0 0 1 1h1"/>
          <circle cx="7.5" cy="17.5" r="2.5"/><circle cx="16.5" cy="17.5" r="2.5"/>
          <path d="M7.5 12h9"/>
        </svg>
      </button>
      <button class="strip-btn" id="stripMotoBtn" title="Motorcycles" aria-label="Motorcycles">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="18" height="18" aria-hidden="true">
          <circle cx="5.5" cy="17.5" r="3"/><circle cx="18.5" cy="17.5" r="3"/>
          <path d="M8.5 17.5h6"/><path d="M15 6l2 5h-5l-3-3"/>
          <path d="M10 8l-2.5 2.5"/>
        </svg>
      </button>
      <div class="strip-sep"></div>
      <button class="strip-btn" id="stripSearchBtn" title="Search" aria-label="Open search">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" aria-hidden="true">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </button>
    </div>

    <!-- Spotlight search overlay -->
    <div class="spotlight-overlay" id="spotlightOverlay" role="dialog" aria-modal="true" aria-label="Search vehicles">
      <div class="spotlight-box" id="spotlightBox">
        <div class="spotlight-input-row">
          <svg class="spotlight-input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22" height="22" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            type="text"
            class="spotlight-input"
            id="spotlightInput"
            placeholder="Search vehicles..."
            autocomplete="off"
            spellcheck="false"
          >
          <button class="spotlight-close" id="spotlightClose" aria-label="Close search">esc</button>
        </div>
        <div class="spotlight-results" id="spotlightResults"></div>
      </div>
    </div>

    <section class="browse-section">
      <div class="browse-inner">
        <h2 class="tree-list-title">Tree Vehicle List</h2>
        <div class="tree-root" id="treeRoot" role="tree" aria-label="Browse vehicles by make"></div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-logo"><span class="footer-logo-motor">MOTOR</span><span class="footer-logo-index">INDEX</span></span>
      <span class="footer-sep">—</span>
      <span class="footer-copy">Data sourced from NHTSA · Wikipedia · Manufacturer specifications</span>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/search.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
