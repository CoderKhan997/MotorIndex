<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse — MotorIndex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,300;0,400;0,500;0,700;0,900;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="logo">
        <span class="logo-mark"><span class="logo-m">M</span><span class="logo-i">I</span></span>
      </a>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="theme-icon theme-icon--sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/>
          <line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/>
          <line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="theme-icon theme-icon--moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="20" height="20" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </div>
  </header>

  <main class="browse-main">
    <div class="page-inner">

      <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb">
        <a href="index.html" class="breadcrumb-link">Home</a>
        <span class="breadcrumb-sep">›</span>
        <span class="breadcrumb-current" id="breadcrumbMake">—</span>
      </nav>

      <div class="browse-page-header">
        <div class="browse-make-badge" id="makeBadge">
          <span class="make-initial" id="makeInitial">—</span>
        </div>
        <div class="browse-make-info">
          <p class="browse-make-label">MANUFACTURER</p>
          <h1 class="browse-make-name" id="makeNameHeading">Loading...</h1>
          <p class="browse-make-count" id="makeModelCount"></p>
        </div>
      </div>

      <div class="section-header">
        <h2 class="section-title">SELECT MODEL</h2>
        <div class="section-rule"></div>
      </div>

      <div class="browse-search-wrap">
        <div class="mini-search">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" class="mini-search-input" id="modelFilter" placeholder="Filter models...">
        </div>
      </div>

      <div class="models-grid" id="modelsGrid">
        <div class="grid-skeleton">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>

    </div>
  </main>

  <!-- Year selector modal -->
  <div class="modal-overlay hidden" id="yearModal" role="dialog" aria-modal="true" aria-labelledby="yearModalTitle">
    <div class="modal">
      <div class="modal-header">
        <h2 class="modal-title" id="yearModalTitle">SELECT YEAR</h2>
        <button class="modal-close" id="modalClose" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="18" height="18">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <p class="modal-subtitle" id="modalModelName"></p>
      <div class="year-grid" id="yearGrid"></div>
    </div>
  </div>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-logo"><span class="footer-logo-motor">MOTOR</span><span class="footer-logo-index">INDEX</span></span>
      <span class="footer-sep">—</span>
      <span class="footer-copy">Data sourced from NHTSA · Wikipedia · Manufacturer specifications</span>
    </div>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/api.js"></script>
  <script src="js/browse.js"></script>
</body>
</html>
